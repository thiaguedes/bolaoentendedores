<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🏆 Bolão Copa do Mundo 2026</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-dark:#004d1a; --green:#006622; --green-mid:#008c2e; --green-light:#00b33c;
      --gold:#FFD700; --gold-dark:#c8a800; --white:#ffffff; --off-white:#f4f9f5;
      --gray-light:#e8f0ea; --gray:#9aafa0; --gray-dark:#4a5f50; --text:#1a2e1f;
      --red:#c0392b; --blue:#1a6aad; --purple:#7c3aed; --amber:#f59e0b;
      --shadow:0 2px 12px rgba(0,80,20,.15); --radius:10px;
    }
    body { font-family:'Segoe UI',system-ui,-apple-system,sans-serif; background:var(--off-white); color:var(--text); min-height:100vh; }

    header {
      background-image: repeating-linear-gradient(90deg,rgba(255,255,255,.04) 0px,rgba(255,255,255,.04) 40px,transparent 40px,transparent 80px),
        linear-gradient(135deg,var(--green-dark) 0%,var(--green) 50%,var(--green-mid) 100%);
      padding:24px 20px 20px; text-align:center; color:var(--white); position:relative; overflow:hidden;
    }
    header::after { content:''; position:absolute; bottom:0; left:0; right:0; height:4px; background:linear-gradient(90deg,var(--gold),var(--gold-dark),var(--gold)); }
    .header-trophy { font-size:2.8rem; display:block; line-height:1; }
    .header-title  { font-size:1.8rem; font-weight:800; letter-spacing:.5px; margin:6px 0 2px; }
    .header-sub    { font-size:.85rem; color:rgba(255,255,255,.75); letter-spacing:1px; text-transform:uppercase; }

    .toolbar { background:var(--white); border-bottom:1px solid var(--gray-light); padding:10px 16px; display:flex; flex-wrap:wrap; gap:8px; align-items:center; justify-content:space-between; }
    .toolbar-actions { display:flex; gap:6px; flex-wrap:wrap; }
    .btn { display:inline-flex; align-items:center; gap:5px; border:none; border-radius:6px; cursor:pointer; font-size:.8rem; font-weight:600; padding:7px 13px; transition:opacity .15s,transform .1s; }
    .btn:hover { opacity:.88; } .btn:active { transform:scale(.97); }
    .btn-green { background:var(--green); color:var(--white); }
    .btn-gold  { background:var(--gold); color:var(--green-dark); }
    .btn-danger{ background:var(--red); color:var(--white); }
    .btn-gray  { background:var(--gray-light); color:var(--gray-dark); }

    .search-box { display:flex; align-items:center; gap:6px; background:var(--gray-light); border-radius:6px; padding:6px 10px; flex:1; min-width:180px; max-width:280px; }
    .search-box input { border:none; background:transparent; outline:none; font-size:.85rem; color:var(--text); width:100%; }

    .tabs { background:var(--white); border-bottom:2px solid var(--gray-light); display:flex; overflow-x:auto; scrollbar-width:none; }
    .tabs::-webkit-scrollbar { display:none; }
    .tab { flex-shrink:0; padding:13px 18px; font-size:.85rem; font-weight:600; color:var(--gray-dark); cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-2px; transition:color .15s,border-color .15s; white-space:nowrap; }
    .tab:hover { color:var(--green); }
    .tab.active { color:var(--green); border-color:var(--gold); }
    .tab.knockout { }

    main { padding:20px 16px; max-width:1100px; margin:0 auto; }
    .tab-panel { display:none; }
    .tab-panel.active { display:block; }

    .round-header { display:flex; align-items:center; gap:10px; margin-bottom:18px; flex-wrap:wrap; }
    .round-badge { background:var(--green); color:var(--white); font-size:.75rem; font-weight:700; padding:4px 10px; border-radius:20px; letter-spacing:.5px; text-transform:uppercase; }
    .round-title { font-size:1.2rem; font-weight:700; color:var(--green-dark); }
    .round-badge.gold { background:var(--gold-dark); }

    .group-section { margin-bottom:32px; }
    .group-label { font-size:.78rem; font-weight:800; text-transform:uppercase; letter-spacing:1.5px; background:var(--green-dark); display:inline-block; padding:3px 12px; border-radius:4px; color:var(--gold); margin-bottom:10px; }

    /* GAME CARD — fase de grupos */
    .game-card { background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:16px; overflow:hidden; border:1px solid var(--gray-light); transition:box-shadow .2s; }
    .game-card:hover { box-shadow:0 4px 20px rgba(0,80,20,.2); }
    .game-card.finished { border-left:4px solid var(--green-light); }
    .game-header { background:linear-gradient(90deg,var(--green-dark),var(--green)); color:var(--white); padding:10px 16px; display:flex; align-items:center; justify-content:space-between; }
    .game-id { font-size:.72rem; opacity:.7; min-width:60px; }
    .game-matchup { font-weight:700; font-size:.95rem; text-align:center; flex:1; display:flex; align-items:center; justify-content:center; gap:8px; }
    .game-vs { font-size:.7rem; opacity:.6; }
    .game-status { font-size:.7rem; padding:2px 8px; border-radius:10px; min-width:80px; text-align:right; }
    .game-status.open { color:var(--gold); } .game-status.finished { color:#7aff7a; }
    .official-result-bar { display:flex; align-items:center; justify-content:center; gap:8px; padding:6px 16px; background:var(--gray-light); font-size:.8rem; font-weight:600; color:var(--gray-dark); border-bottom:1px solid #dde8df; }
    .official-result-bar.has-result { background:#d4f0dc; color:var(--green-dark); }

    .participants-table { width:100%; border-collapse:collapse; }
    .participants-table th { background:var(--off-white); font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--gray-dark); padding:8px 12px; border-bottom:1px solid var(--gray-light); text-align:center; }
    .participants-table th.name-col { text-align:left; }
    .participants-table td { padding:9px 12px; border-bottom:1px solid var(--gray-light); text-align:center; font-size:.88rem; }
    .participants-table tr:last-child td { border-bottom:none; }
    .participants-table tr:hover td { background:var(--off-white); }
    .participant-name { font-weight:700; color:var(--green-dark); text-align:left; }
    .participant-points-cell { font-weight:700; font-size:.95rem; }
    .pts-5 { color:var(--green); } .pts-2 { color:var(--blue); } .pts-0 { color:var(--gray); }

    .score-group { display:inline-flex; align-items:center; gap:4px; background:var(--gray-light); border-radius:6px; padding:2px 6px; }
    .score-input { width:38px; padding:5px 4px; border:1px solid transparent; border-radius:4px; font-size:.9rem; font-weight:700; text-align:center; background:var(--white); color:var(--text); transition:border-color .15s; -moz-appearance:textfield; }
    .score-input::-webkit-outer-spin-button,.score-input::-webkit-inner-spin-button { -webkit-appearance:none; }
    .score-input:focus { outline:none; border-color:var(--green-light); box-shadow:0 0 0 2px rgba(0,180,60,.15); }
    .score-input:disabled { background:var(--gray-light); color:var(--gray); }
    .score-x { font-weight:700; color:var(--gray); font-size:.8rem; }
    .exact-score td { background:#fff9d0 !important; }

    /* KNOCKOUT CARD */
    .ko-card {
      background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow);
      margin-bottom:18px; overflow:hidden; border:1px solid var(--gray-light);
    }
    .ko-card.finished { border-left:4px solid var(--gold-dark); }
    .ko-header {
      background:linear-gradient(90deg,#1a1a2e,#16213e);
      color:var(--white); padding:10px 16px; display:flex; align-items:center; justify-content:space-between;
    }
    .ko-id { font-size:.7rem; opacity:.6; }
    .ko-matchup { font-weight:700; font-size:.92rem; text-align:center; flex:1; display:flex; align-items:center; justify-content:center; gap:8px; }
    .ko-status { font-size:.7rem; min-width:80px; text-align:right; }
    .ko-status.open { color:var(--gold); } .ko-status.finished { color:#7aff7a; }

    .ko-result-bar { display:flex; align-items:center; justify-content:center; gap:8px; padding:6px 16px; background:var(--gray-light); font-size:.8rem; font-weight:600; color:var(--gray-dark); border-bottom:1px solid #dde8df; }
    .ko-result-bar.has-result { background:#fff3b0; color:#7a5c00; }

    /* Participante row no ko */
    .ko-table { width:100%; border-collapse:collapse; }
    .ko-table th { background:var(--off-white); font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.4px; color:var(--gray-dark); padding:7px 10px; border-bottom:1px solid var(--gray-light); text-align:center; }
    .ko-table th.name-col { text-align:left; }
    .ko-table td { padding:8px 10px; border-bottom:1px solid var(--gray-light); text-align:center; font-size:.85rem; }
    .ko-table tr:last-child td { border-bottom:none; }
    .ko-table tr:hover td { background:var(--off-white); }

    /* Palpite KO: placar + quem passa + pênaltis */
    .ko-palpite-wrap { display:flex; align-items:center; gap:6px; justify-content:center; flex-wrap:wrap; }
    .ko-score-group { display:inline-flex; align-items:center; gap:3px; background:var(--gray-light); border-radius:6px; padding:2px 5px; }
    .ko-score-inp { width:34px; padding:4px 3px; border:1px solid transparent; border-radius:4px; font-size:.85rem; font-weight:700; text-align:center; background:var(--white); color:var(--text); -moz-appearance:textfield; }
    .ko-score-inp::-webkit-outer-spin-button,.ko-score-inp::-webkit-inner-spin-button { -webkit-appearance:none; }
    .ko-score-inp:focus { outline:none; border-color:var(--gold); }
    .ko-score-inp:disabled { background:var(--gray-light); color:var(--gray); }

    .ko-adv-wrap { display:flex; align-items:center; gap:4px; font-size:.75rem; }
    .ko-adv-label { color:var(--gray-dark); font-weight:600; white-space:nowrap; }
    .ko-adv-select { border:1px solid var(--gray-light); border-radius:5px; font-size:.75rem; padding:3px 5px; background:var(--white); color:var(--text); cursor:pointer; max-width:120px; }
    .ko-adv-select:disabled { background:var(--gray-light); color:var(--gray); }

    .ko-pts-badge { font-weight:700; font-size:.88rem; min-width:50px; }

    /* RESULTS TAB */
    .filter-bar { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; align-items:center; }
    .filter-btn { padding:5px 12px; border-radius:20px; border:2px solid var(--gray-light); font-size:.78rem; font-weight:700; cursor:pointer; background:var(--white); color:var(--gray-dark); transition:all .15s; }
    .filter-btn:hover { border-color:var(--green); color:var(--green); }
    .filter-btn.active { background:var(--green); color:var(--white); border-color:var(--green); }

    .results-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:16px; }
    .result-card { background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow); padding:16px; border:1px solid var(--gray-light); }
    .result-card.done { border-left:4px solid var(--green-light); }
    .result-card.ko-done { border-left:4px solid var(--gold-dark); }
    .result-card-title { font-size:.75rem; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:var(--gray-dark); margin-bottom:10px; }
    .result-matchup { display:flex; align-items:center; justify-content:center; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
    .team-name { font-weight:700; font-size:.88rem; flex:1; }
    .team-name.home { text-align:right; } .team-name.away { text-align:left; }
    .result-inputs { display:flex; align-items:center; gap:6px; }
    .result-input { width:50px; padding:8px 4px; border:2px solid var(--gray-light); border-radius:6px; font-size:1.1rem; font-weight:800; text-align:center; -moz-appearance:textfield; }
    .result-input::-webkit-outer-spin-button,.result-input::-webkit-inner-spin-button { -webkit-appearance:none; }
    .result-input:focus { outline:none; border-color:var(--green); }
    .result-x { font-weight:700; color:var(--gray); }
    .btn-confirm { width:100%; margin-top:10px; padding:9px; border:none; border-radius:6px; background:var(--green); color:var(--white); font-weight:700; font-size:.85rem; cursor:pointer; transition:background .15s; }
    .btn-confirm:hover { background:var(--green-dark); }
    .btn-confirm:disabled { background:var(--gray); cursor:not-allowed; }
    .btn-edit-result { width:100%; margin-top:6px; padding:8px; border:none; border-radius:6px; background:var(--amber); color:#1a1a1a; font-weight:700; font-size:.8rem; cursor:pointer; }
    .btn-edit-result:hover { background:#d97706; color:var(--white); }
    .confirmed-badge { text-align:center; margin-top:8px; font-size:.78rem; font-weight:700; color:var(--green); display:none; }
    .result-card.done .confirmed-badge,.result-card.ko-done .confirmed-badge { display:block; }
    .result-card.done .btn-confirm,.result-card.ko-done .btn-confirm { background:var(--gray); }

    /* KO extra fields in result card */
    .ko-result-extra { margin-top:8px; display:flex; flex-direction:column; gap:6px; }
    .ko-result-row { display:flex; align-items:center; gap:8px; font-size:.8rem; }
    .ko-result-row label { color:var(--gray-dark); font-weight:600; min-width:90px; }
    .ko-result-select { border:1px solid var(--gray-light); border-radius:5px; font-size:.8rem; padding:4px 6px; background:var(--white); flex:1; }
    .ko-result-select:disabled { background:var(--gray-light); }

    /* RANKING */
    .ranking-table { width:100%; border-collapse:collapse; background:var(--white); border-radius:var(--radius); overflow:hidden; box-shadow:var(--shadow); }
    .ranking-table th { background:var(--green-dark); color:var(--white); padding:12px 16px; font-size:.82rem; text-transform:uppercase; letter-spacing:.5px; }
    .ranking-table td { padding:13px 16px; border-bottom:1px solid var(--gray-light); }
    .ranking-table tr:last-child td { border-bottom:none; }
    .rank-pos { font-weight:800; font-size:1.1rem; text-align:center; }
    .rank-name { font-weight:700; font-size:1rem; }
    .rank-pts { font-weight:800; font-size:1.1rem; text-align:center; color:var(--green); }
    .rank-1 td { background:linear-gradient(90deg,#fff9d0,#fffef5); }
    .rank-2 td { background:linear-gradient(90deg,#f0f0f0,#fafafa); }
    .rank-3 td { background:linear-gradient(90deg,#fff2e8,#fffdf9); }
    .rank-breakdown { display:flex; gap:8px; margin-top:4px; flex-wrap:wrap; }
    .rank-breakdown span { font-size:.72rem; font-weight:600; padding:1px 7px; border-radius:10px; }
    .bd-5 { background:#d4f7dc; color:var(--green-dark); }
    .bd-2 { background:#dde9ff; color:var(--blue); }
    .bd-ko { background:#fff3b0; color:#7a5c00; }

    /* TOAST */
    #toast { position:fixed; bottom:24px; right:24px; background:var(--green-dark); color:var(--white); padding:12px 20px; border-radius:8px; font-size:.88rem; font-weight:600; box-shadow:0 4px 20px rgba(0,0,0,.3); transform:translateY(60px); opacity:0; transition:all .3s; z-index:999; border-left:4px solid var(--gold); }
    #toast.show { transform:translateY(0); opacity:1; }

    /* MODAL */
    .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); display:flex; align-items:center; justify-content:center; z-index:900; opacity:0; pointer-events:none; transition:opacity .2s; }
    .modal-overlay.open { opacity:1; pointer-events:all; }
    .modal-box { background:var(--white); border-radius:var(--radius); padding:28px; max-width:380px; width:90%; box-shadow:0 8px 40px rgba(0,0,0,.3); }
    .modal-title { font-weight:700; font-size:1.1rem; margin-bottom:10px; }
    .modal-msg { font-size:.88rem; color:var(--gray-dark); margin-bottom:20px; }
    .modal-btns { display:flex; gap:10px; justify-content:flex-end; }

    .no-results-msg { text-align:center; color:var(--gray); padding:40px; font-size:.95rem; }

    @media (max-width:600px) {
      .participants-table th,.participants-table td { padding:6px 6px; font-size:.76rem; }
      .ko-table th,.ko-table td { padding:6px 6px; font-size:.76rem; }
      .tab { padding:11px 12px; font-size:.78rem; }
      main { padding:14px 10px; }
      .header-title { font-size:1.4rem; }
      .results-grid { grid-template-columns:1fr; }
      .ko-palpite-wrap { flex-direction:column; gap:4px; }
    }
  </style>
</head>
<body>

<header>
  <span class="header-trophy">🏆</span>
  <div class="header-title">Bolão Copa do Mundo 2026</div>
  <div class="header-sub">EUA · Canadá · México &nbsp;|&nbsp; 11 Jun – 19 Jul 2026</div>
</header>

<div class="toolbar">
  <div class="search-box">🔍 <input type="text" id="searchInput" placeholder="Buscar seleção…" /></div>
  <div class="toolbar-actions">
    <button class="btn btn-green" onclick="exportData()">⬇ Exportar</button>
    <label class="btn btn-gold">⬆ Importar<input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)"/></label>
    <button class="btn btn-danger" onclick="confirmClear()">🗑 Limpar Tudo</button>
  </div>
</div>

<div class="tabs" id="tabsNav">
  <div class="tab active" data-tab="round1">⚽ R1</div>
  <div class="tab" data-tab="round2">⚽ R2</div>
  <div class="tab" data-tab="round3">⚽ R3</div>
  <div class="tab" data-tab="r16">⚔️ 16 Avos</div>
  <div class="tab" data-tab="r8">⚔️ Oitavas</div>
  <div class="tab" data-tab="r4">⚔️ Quartas</div>
  <div class="tab" data-tab="r2">⚔️ Semis</div>
  <div class="tab" data-tab="final">🏆 Final</div>
  <div class="tab" data-tab="results">📋 Resultados</div>
  <div class="tab" data-tab="ranking">🏅 Classificação</div>
</div>

<main>
  <div class="tab-panel active" id="panel-round1"></div>
  <div class="tab-panel" id="panel-round2"></div>
  <div class="tab-panel" id="panel-round3"></div>
  <div class="tab-panel" id="panel-r16"></div>
  <div class="tab-panel" id="panel-r8"></div>
  <div class="tab-panel" id="panel-r4"></div>
  <div class="tab-panel" id="panel-r2"></div>
  <div class="tab-panel" id="panel-final"></div>

  <div class="tab-panel" id="panel-results">
    <div class="round-header">
      <span class="round-badge">Admin</span>
      <span class="round-title">Resultados Oficiais</span>
    </div>
    <div class="filter-bar" id="resultsFilterBar">
      <span style="font-size:.8rem;font-weight:600;color:var(--gray-dark)">Filtrar:</span>
      <button class="filter-btn active" onclick="setFilter('all',this)">Todos</button>
      <button class="filter-btn" onclick="setFilter('1',this)">R1</button>
      <button class="filter-btn" onclick="setFilter('2',this)">R2</button>
      <button class="filter-btn" onclick="setFilter('3',this)">R3</button>
      <button class="filter-btn" onclick="setFilter('r16',this)">16 Avos</button>
      <button class="filter-btn" onclick="setFilter('r8',this)">Oitavas</button>
      <button class="filter-btn" onclick="setFilter('r4',this)">Quartas</button>
      <button class="filter-btn" onclick="setFilter('r2',this)">Semis</button>
      <button class="filter-btn" onclick="setFilter('final',this)">Final</button>
      <button class="filter-btn" onclick="setFilter('open',this)">Abertos</button>
      <button class="filter-btn" onclick="setFilter('done',this)">Confirmados</button>
    </div>
    <div class="results-grid" id="resultsGrid"></div>
  </div>

  <div class="tab-panel" id="panel-ranking">
    <div class="round-header">
      <span class="round-badge">Classificação</span>
      <span class="round-title">Bolão do Grupo</span>
    </div>
    <table class="ranking-table">
      <thead><tr>
        <th style="width:60px">Pos.</th>
        <th>Participante</th>
        <th style="width:110px">Pontos</th>
        <th>Detalhes</th>
      </tr></thead>
      <tbody id="rankingBody"></tbody>
    </table>
  </div>
</main>

<div id="toast"></div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-title" id="modalTitle"></div>
    <div class="modal-msg" id="modalMsg"></div>
    <div class="modal-btns">
      <button class="btn btn-gray" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-danger" id="modalOk">Confirmar</button>
    </div>
  </div>
</div>

<script>
/* =========================================================
   FASE DE GRUPOS — 72 jogos
   ========================================================= */
const JOGOS = [
  {id: 1,rodada:1,fase:'g',grupo:"A",mandante:"México",visitante:"África do Sul",data:"11/06"},
  {id: 2,rodada:1,fase:'g',grupo:"A",mandante:"Coreia do Sul",visitante:"República Tcheca",data:"11/06"},
  {id: 3,rodada:1,fase:'g',grupo:"B",mandante:"Canadá",visitante:"Bósnia e Herzegovina",data:"12/06"},
  {id: 4,rodada:1,fase:'g',grupo:"B",mandante:"Catar",visitante:"Suíça",data:"13/06"},
  {id: 5,rodada:1,fase:'g',grupo:"C",mandante:"Brasil",visitante:"Marrocos",data:"13/06"},
  {id: 6,rodada:1,fase:'g',grupo:"C",mandante:"Haiti",visitante:"Escócia",data:"13/06"},
  {id: 7,rodada:1,fase:'g',grupo:"D",mandante:"Estados Unidos",visitante:"Paraguai",data:"12/06"},
  {id: 8,rodada:1,fase:'g',grupo:"D",mandante:"Austrália",visitante:"Turquia",data:"13/06"},
  {id: 9,rodada:1,fase:'g',grupo:"E",mandante:"Alemanha",visitante:"Curaçao",data:"14/06"},
  {id:10,rodada:1,fase:'g',grupo:"E",mandante:"Costa do Marfim",visitante:"Equador",data:"14/06"},
  {id:11,rodada:1,fase:'g',grupo:"F",mandante:"Holanda",visitante:"Japão",data:"14/06"},
  {id:12,rodada:1,fase:'g',grupo:"F",mandante:"Tunísia",visitante:"Suécia",data:"14/06"},

/* ── PONTUAÇÃO GRUPOS ── */
function getWinner(h,a){ return h>a?'home':a>h?'away':'draw'; }
function calcPontosGrupo(pal,res){
  if (!res||!res.confirmed) return null;
  const ph=Number(pal.home),pa=Number(pal.away),rh=Number(res.home),ra=Number(res.away);
  if (isNaN(ph)||isNaN(pa)||pal.home===''||pal.away==='') return 0;
  if (ph===rh&&pa===ra) return 5;
  if (getWinner(ph,pa)===getWinner(rh,ra)) return 2;
  return 0;
}

/* ── PONTUAÇÃO MATA-MATA ──
   Regras:
   - Placar exato no tempo normal = 5pts
   - Acertou quem avança = 2pts
   - Acertou empate no tempo normal = 2pts
   - Acertou empate + quem avança = 4pts
   - Acertou placar do empate + quem avança nos pênaltis = 7pts (5+2)
   Nota: empate aqui = empate no tempo normal (vai p/ pênaltis)
*/
function calcPontosKO(pal, res){
  if (!res||!res.confirmed) return null;
  if (!pal||pal.home===''||pal.away==='') return 0;

  const ph=Number(pal.home), pa=Number(pal.away);
  const rh=Number(res.home), ra=Number(res.away);
  const pAvanca = pal.avanca||'';
  const rAvanca = res.avanca||'';

  const placarExato   = (ph===rh && pa===ra);
  const empateReal    = (rh===ra);
  const empateAlp     = (ph===pa);
  const acertouAvanca = (pAvanca && rAvanca && pAvanca===rAvanca);

  let pts = 0;
  if (placarExato) {
    pts += 5;
    if (empateReal && acertouAvanca) pts += 2; // placar do empate + quem avança = 7
  } else if (empateReal && empateAlp) {
    pts += 2; // acertou empate
    if (acertouAvanca) pts += 2; // + quem avança = 4
  } else if (acertouAvanca) {
    pts += 2;
  }
  return pts;
}

function getClassificacao(){
  return PARTICIPANTES.map(p => {
    let total=0, exact=0, winner=0, kopts=0;
    JOGOS.forEach(j => {
      const res=state.resultados[j.id], pal=(state.palpites[j.id]||{})[p];
      if (!pal) return;
      const pts=calcPontosGrupo(pal,res);
      if (pts===5){total+=5;exact++;} else if (pts===2){total+=2;winner++;}
    });
    JOGOS_KO.forEach(j => {
      const res=state.koresult[j.id], pal=(state.kopalp[j.id]||{})[p];
      if (!pal) return;
      const pts=calcPontosKO(pal,res);
      if (pts>0){total+=pts;kopts+=pts;}
    });
    return {nome:p,total,exact,winner,kopts};
  }).sort((a,b)=>b.total-a.total||b.exact-a.exact);
}

              onchange="savePalpite(${jogo.id},'${p}','away',this.value)" placeholder="–"/>
          </div></td>
          <td>${badge}</td>
        </tr>`;
      });
      sec+=`<div class="game-card ${fin?'finished':''}">
        <div class="game-header">
          <span class="game-id">#${jogo.id} · ${jogo.data}</span>
          <div class="game-matchup">${mF} ${jogo.mandante} <span class="game-vs">×</span> ${jogo.visitante} ${vF}</div>

        <table class="participants-table">

function renderResults(){

  // Fase de grupos
  JOGOS.forEach(jogo=>{

/* ── AÇÕES ── */
function savePalpite(jogoId,p,campo,valor){
  if (!state.palpites[jogoId]) state.palpites[jogoId]={};
  if (!state.palpites[jogoId][p]) state.palpites[jogoId][p]={home:'',away:''};
  state.palpites[jogoId][p][campo]=valor===''?'':Number(valor);
  saveState();
}

function saveKOPalpite(jogoId,p,campo,valor){
  if (!state.kopalp[jogoId]) state.kopalp[jogoId]={};
  if (!state.kopalp[jogoId][p]) state.kopalp[jogoId][p]={home:'',away:'',avanca:''};
  state.kopalp[jogoId][p][campo]=valor===''?'':campo==='home'||campo==='away'?Number(valor):valor;
  saveState();
  // re-render to show/hide pênaltis select
  const jogo=JOGOS_KO.find(j=>j.id===jogoId);
  if (jogo) renderKO(jogo.fase);
}

function confirmResult(jogoId){
  const h=document.getElementById(`rh-${jogoId}`).value;
  const a=document.getElementById(`ra-${jogoId}`).value;
  if (h===''||a===''){showToast('⚠️ Preencha ambos os campos!');return;}
  state.resultados[jogoId]={home:Number(h),away:Number(a),confirmed:true};
  saveState(); renderAll();
  showToast('✅ Resultado confirmado!');
}

function editarResultado(jogoId){
  openModal('Corrigir resultado?','O jogo será reaberto para edição.',()=>{
    state.resultados[jogoId].confirmed=false;
    saveState(); renderAll(); closeModal();
    showToast('✏️ Resultado reaberto.');
  });
}

function confirmKOResult(jogoId){
  const h=document.getElementById(`rh-${jogoId}`).value;
  const a=document.getElementById(`ra-${jogoId}`).value;
  const avanca=document.getElementById(`kavanca-${jogoId}`).value;
  if (h===''||a===''){showToast('⚠️ Preencha o placar!');return;}
  if (!avanca){showToast('⚠️ Selecione quem avança!');return;}
  const isEmpate=Number(h)===Number(a);
  state.koresult[jogoId]={
    home:Number(h),away:Number(a),
    avanca:avanca,
    confirmed:true
  };
  saveState(); renderAll();
  showToast('✅ Resultado do mata-mata confirmado!');
}

function editarKOResultado(jogoId){
  openModal('Corrigir resultado?','O jogo será reaberto para edição.',()=>{
    state.koresult[jogoId].confirmed=false;
    saveState(); renderAll(); closeModal();
    showToast('✏️ Resultado reaberto.');
  });
}

function exportData(){
  const url=URL.createObjectURL(new Blob([JSON.stringify({state,exportedAt:new Date().toISOString()},null,2)],{type:'application/json'}));
  const a=document.createElement('a'); a.href=url; a.download=`bolao-copa-2026-${Date.now()}.json`; a.click();
  URL.revokeObjectURL(url); showToast('📁 Dados exportados!');
}
function importData(e){
  const f=e.target.files[0]; if (!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    try {
      const d=JSON.parse(ev.target.result);
      if (d.state){
        state=d.state;
        if (!state.kopalp) state.kopalp={};
        if (!state.koresult) state.koresult={};
        saveState(); renderAll(); showToast('📂 Dados importados!');
      } else showToast('❌ Arquivo inválido!');
    } catch {showToast('❌ Erro ao importar!');}
  };
  r.readAsText(f); e.target.value='';
}
function confirmClear(){
  openModal('Limpar todos os dados?','Isso apaga todos os palpites e resultados permanentemente.',()=>{
    state={palpites:{},kopalp:{},resultados:{},koresult:{}};
    saveState(); renderAll(); closeModal(); showToast('🗑️ Dados apagados.');
  });
}
